<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1923">
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1923;--surface:#172130;--card:#1e2d3d;
  --border:rgba(255,255,255,0.09);--text:#f0f4f8;
  --muted:rgba(240,244,248,0.42);--accent:#e94560;
  --green:#27c97a;--blue:#4a9eff;--r:14px;--rs:10px;
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overflow:hidden;overscroll-behavior:none}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;padding-bottom:60px;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .32s}
.screen.hidden{transform:translateY(50px);opacity:0;pointer-events:none}
.screen.slide-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.topbar{padding:40px 18px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:19px;font-weight:600;letter-spacing:-.3px}
.topbar .sub{font-size:11px;color:var(--muted);margin-top:1px}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px}
.amount-bar{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:baseline;gap:6px;flex-shrink:0}
.amount-bar .cur{font-size:18px;font-weight:300;color:var(--muted)}
.amount-bar .val{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--text);letter-spacing:-1px;flex:1;min-width:10px}
.amount-bar .val.on{color:var(--accent)}
.amount-bar .bksp{width:40px;height:40px;border-radius:var(--rs);background:rgba(255,255,255,0.05);border:none;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sec-lbl{padding:0 16px 6px;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;flex-shrink:0}
.cat-scroll{padding:0 16px 2px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:7px 13px;border-radius:40px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mode-row{padding:7px 16px 0;display:flex;gap:6px;flex-shrink:0}
.mode-chip{flex:1;padding:6px 2px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:500;text-align:center;cursor:pointer;transition:all .14s}
.mode-chip.active{border-color:var(--blue);color:var(--blue);background:rgba(74,158,255,.1)}
.date-row{padding:7px 16px 0;display:flex;align-items:center;gap:8px;flex-shrink:0}
.date-badge{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.date-badge b{color:var(--text);font-weight:500}
.date-inp{position:absolute;opacity:0;width:1px;height:1px}
.date-edit{padding:7px 11px;border-radius:var(--rs);background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap}
.note-row{padding:7px 16px 0;flex-shrink:0}
.note-inp{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 13px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;outline:none}
.note-inp::placeholder{color:var(--muted)}
.numpad{flex-shrink:0;height:216px;padding:8px 16px 8px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.num-key{background:var(--card);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:400;color:var(--text);cursor:pointer;transition:background .1s,transform .08s;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.num-key:active{background:var(--surface);transform:scale(.93)}
.num-key.dot{font-size:26px;font-weight:300}
.num-key.submit{background:var(--accent);border-color:var(--accent);font-size:14px;font-weight:600;letter-spacing:.04em;color:#fff}
.num-key.submit:active{background:#c73450}
.navbar{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;transition:color .14s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}
.suc-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;opacity:0;pointer-events:none;transition:opacity .28s}
.suc-overlay.show{opacity:1;pointer-events:all}
.suc-icon{width:72px;height:72px;border-radius:50%;background:rgba(39,201,122,.14);display:flex;align-items:center;justify-content:center;font-size:32px;animation:pop .38s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.suc-amt{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--green)}
.suc-cat{font-size:14px;color:var(--muted)}
.suc-btn{margin-top:14px;padding:12px 36px;background:var(--card);border:1.5px solid var(--border);border-radius:40px;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.history-list{flex:1;overflow-y:auto;padding:0 0 16px}
.history-list::-webkit-scrollbar{display:none}
.hist-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.hist-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#e74c3c;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.hist-item{display:flex;align-items:center;gap:11px;padding:12px 16px;background:var(--bg);transition:transform .2s ease;position:relative;z-index:1}
.hist-item.swiped{transform:translateX(-80px)}
.hist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hist-body{flex:1;min-width:0}
.hist-cat{font-size:13px;font-weight:500}
.hist-note{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-right{text-align:right;flex-shrink:0}
.hist-amt{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent)}
.hist-date{font-size:10px;color:var(--muted);margin-top:2px}
.empty-hist{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.settings-body{flex:1;overflow-y:auto;padding:0 16px 40px}
.setting-block{margin-bottom:20px}
.setting-block h3{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.setting-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.setting-row label{font-size:12px;color:var(--muted);min-width:66px;flex-shrink:0}
.setting-row input,.setting-row textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif}
.setting-row textarea{resize:none;height:32px;line-height:1.4}
.save-btn{width:100%;padding:14px;border-radius:var(--r);background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.url-hint{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.5}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>

<div class="screen" id="screen-add">
  <div class="topbar">
    <div><h1>Log Expense</h1><div class="sub" id="today-label"></div></div>
    <div class="icon-btn" onclick="openSettings()">⚙</div>
  </div>
  <div class="amount-bar">
    <span class="cur">₹</span>
    <div class="val" id="amt-display">0</div>
    <button class="bksp" onclick="backspace()">⌫</button>
  </div>
  <div class="sec-lbl">Category</div>
  <div class="cat-scroll" id="cat-scroll"></div>
  <div class="mode-row" id="mode-row"></div>
  <div class="date-row">
    <div class="date-badge">📅 <b id="date-display"></b></div>
    <input type="date" class="date-inp" id="date-inp" onchange="dateChanged()">
    <div class="date-edit" onclick="document.getElementById('date-inp').click()">Change</div>
  </div>
  <div class="note-row">
    <textarea class="note-inp" id="note-inp" placeholder="Note (optional)" rows="1"></textarea>
  </div>
  <div class="numpad" id="numpad"></div>
</div>

<div class="screen hidden" id="screen-history">
  <div class="topbar">
    <div><h1>History</h1><div class="sub" id="hist-total-label"></div></div>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<div class="screen hidden slide-left" id="screen-settings">
  <div class="topbar">
    <div class="icon-btn" onclick="closeSettings()">←</div>
    <div style="flex:1;padding-left:12px"><h1>Settings</h1></div>
  </div>
  <div class="settings-body">
    <div class="setting-block">
      <h3>Google Sheet (optional)</h3>
      <div class="setting-row"><label>URL</label><textarea id="cfg-url" placeholder="Apps Script Web App URL"></textarea></div>
      <div class="url-hint">Sheet → Extensions → Apps Script → Deploy → New Deployment → Web App → Copy URL and paste here</div>
    </div>
    <div class="setting-block">
      <h3>Custom Categories</h3>
      <div class="setting-row"><label>Custom 1</label><input type="text" id="cfg-c1" placeholder="e.g. Medical"></div>
      <div class="setting-row"><label>Custom 2</label><input type="text" id="cfg-c2" placeholder="e.g. Vehicle"></div>
      <div class="setting-row"><label>Custom 3</label><input type="text" id="cfg-c3" placeholder="e.g. EMI"></div>
    </div>
    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<div class="suc-overlay" id="suc-overlay">
  <div class="suc-icon">✓</div>
  <div class="suc-amt" id="suc-amt"></div>
  <div class="suc-cat" id="suc-cat"></div>
  <button class="suc-btn" onclick="dismissSuccess()">Add Another</button>
</div>

<nav class="navbar">
  <div class="nav-item active" id="nav-add" onclick="showScreen('add')">
    <div class="nav-icon">＋</div><span>Add</span>
  </div>
  <div class="nav-item" id="nav-history" onclick="showScreen('history')">
    <div class="nav-icon">☰</div><span>History</span>
  </div>
</nav>

<script>
const FIXED_CATS=["Grocery","Family","Recharge Bills","Maid","School Education","Tuition Fee","Home Renovation","Home Maintenance","Shopping","Tour","Others"];
const MODES=["Cash","UPI","Card","Net Banking","Cheque"];
const COLORS=["#27c97a","#4a9eff","#f5a623","#e94560","#a78bfa","#34d399","#fb923c","#60a5fa","#f472b6","#2dd4bf","#94a3b8","#ff6b6b","#ffd93d","#6bcb77"];
let amtStr="",selectedCat="",selectedMode="UPI",selectedDate=todayStr();
let entries=[],cfg={url:"",c1:"Custom 1",c2:"Custom 2",c3:"Custom 3"};

function todayStr(){const d=new Date(),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;}
function allCats(){return[...FIXED_CATS,cfg.c1||"Custom 1",cfg.c2||"Custom 2",cfg.c3||"Custom 3"];}
function fmtDate(iso){const[y,m,d]=iso.split("-"),mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return d+" "+mn[parseInt(m)-1]+" "+y;}
function fmtAmt(n){return"₹"+n.toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:2});}

function init(){
  try{const e=localStorage.getItem("exp_e");if(e)entries=JSON.parse(e);}catch(e){}
  try{const c=localStorage.getItem("exp_c");if(c)cfg={...cfg,...JSON.parse(c)};}catch(e){}
  document.getElementById("cfg-url").value=cfg.url||"";
  document.getElementById("cfg-c1").value=cfg.c1==="Custom 1"?"":cfg.c1;
  document.getElementById("cfg-c2").value=cfg.c2==="Custom 2"?"":cfg.c2;
  document.getElementById("cfg-c3").value=cfg.c3==="Custom 3"?"":cfg.c3;
  buildNumpad();buildCats();buildModes();setDateDisplay();
  const d=new Date();
  document.getElementById("today-label").textContent=d.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"});
}

function saveEntries(){try{localStorage.setItem("exp_e",JSON.stringify(entries.slice(0,300)));}catch(e){}}

function buildNumpad(){
  const pad=document.getElementById("numpad");pad.innerHTML="";
  ["1","2","3","4","5","6","7","8","9",".","0","ADD"].forEach(k=>{
    const b=document.createElement("div");
    b.className="num-key"+(k==="."?" dot":"")+(k==="ADD"?" submit":"");
    b.textContent=k==="ADD"?"ADD":k;
    b.addEventListener("click",()=>numPress(k));
    pad.appendChild(b);
  });
}
function numPress(k){
  if(k==="ADD"){submitEntry();return;}
  if(k==="."){if(amtStr.includes("."))return;amtStr=amtStr||"0";}
  if(amtStr.includes(".")){const dec=amtStr.split(".")[1];if(dec&&dec.length>=2)return;}
  if(amtStr==="0"&&k!==".")amtStr=k;else amtStr+=k;
  if(amtStr.length>9){amtStr=amtStr.slice(0,-1);return;}
  updAmt();
}
function backspace(){amtStr=amtStr.slice(0,-1);updAmt();}
function updAmt(){const el=document.getElementById("amt-display");el.textContent=amtStr||"0";el.classList.toggle("on",!!amtStr&&amtStr!=="0");}

function buildCats(){
  const s=document.getElementById("cat-scroll");s.innerHTML="";
  allCats().forEach((cat,i)=>{
    const c=document.createElement("div");c.className="cat-chip"+(selectedCat===cat?" active":"");c.textContent=cat;
    c.addEventListener("click",()=>{selectedCat=cat;document.querySelectorAll(".cat-chip").forEach(x=>x.classList.remove("active"));c.classList.add("active");});
    s.appendChild(c);
  });
}
function buildModes(){
  const r=document.getElementById("mode-row");r.innerHTML="";
  MODES.forEach(m=>{
    const c=document.createElement("div");c.className="mode-chip"+(m===selectedMode?" active":"");c.textContent=m;
    c.addEventListener("click",()=>{selectedMode=m;document.querySelectorAll(".mode-chip").forEach(x=>x.classList.remove("active"));c.classList.add("active");});
    r.appendChild(c);
  });
}
function setDateDisplay(){document.getElementById("date-inp").value=selectedDate;document.getElementById("date-display").textContent=fmtDate(selectedDate);}
function dateChanged(){selectedDate=document.getElementById("date-inp").value||todayStr();setDateDisplay();}

async function submitEntry(){
  const amt=parseFloat(amtStr);
  if(!amtStr||isNaN(amt)||amt<=0){shake(document.querySelector(".amount-bar"));return;}
  if(!selectedCat){shake(document.getElementById("cat-scroll"));return;}
  const note=document.getElementById("note-inp").value.trim();
  const entry={id:Date.now(),date:selectedDate,cat:selectedCat,amt,mode:selectedMode,note};
  entries.unshift(entry);saveEntries();
  showSuccess(amt,selectedCat);
  if(cfg.url)sendToSheet(entry).catch(()=>{});
  amtStr="";updAmt();document.getElementById("note-inp").value="";
}
async function sendToSheet(e){const p=new URLSearchParams({date:e.date,category:e.cat,amount:e.amt,mode:e.mode,note:e.note});await fetch(cfg.url+"?"+p,{method:"GET",mode:"no-cors"});}
function shake(el){el.style.animation="none";el.offsetHeight;el.style.animation="shake .35s ease";setTimeout(()=>el.style.animation="",400);}

function showSuccess(amt,cat){
  document.getElementById("suc-amt").textContent=fmtAmt(amt);
  document.getElementById("suc-cat").textContent=cat+" · "+selectedMode;
  document.getElementById("suc-overlay").classList.add("show");
  setTimeout(dismissSuccess,2000);
}
function dismissSuccess(){document.getElementById("suc-overlay").classList.remove("show");renderHistory();}

function renderHistory(){
  const list=document.getElementById("history-list");
  if(!entries.length){list.innerHTML='<div class="empty-hist">No entries yet.<br>Add your first expense!</div>';document.getElementById("hist-total-label").textContent="No entries yet";return;}
  const total=entries.reduce((a,e)=>a+e.amt,0);
  document.getElementById("hist-total-label").textContent=entries.length+" entries · "+fmtAmt(total);
  const cats=allCats();
  list.innerHTML=entries.slice(0,150).map(e=>{
    const color=COLORS[cats.indexOf(e.cat)%COLORS.length]||"#888";
    return`<div class="hist-wrap" data-id="${e.id}">
      <div class="hist-del-bg">🗑</div>
      <div class="hist-item">
        <div class="hist-dot" style="background:${color}"></div>
        <div class="hist-body"><div class="hist-cat">${e.cat}</div><div class="hist-note">${e.note||e.mode||"—"}</div></div>
        <div class="hist-right"><div class="hist-amt">${fmtAmt(e.amt)}</div><div class="hist-date">${fmtDate(e.date)}</div></div>
      </div>
    </div>`;
  }).join("");
  // Attach swipe listeners
  list.querySelectorAll(".hist-wrap").forEach(wrap=>{
    const item=wrap.querySelector(".hist-item");
    let startX=0,startY=0,dragging=false,swiped=false;
    item.addEventListener("touchstart",ev=>{
      startX=ev.touches[0].clientX;startY=ev.touches[0].clientY;dragging=true;
    },{passive:true});
    item.addEventListener("touchmove",ev=>{
      if(!dragging)return;
      const dx=ev.touches[0].clientX-startX;
      const dy=Math.abs(ev.touches[0].clientY-startY);
      if(dy>20&&Math.abs(dx)<dy){dragging=false;return;}
      if(dx<-10){item.style.transition="none";item.style.transform=`translateX(${Math.max(dx,-80)}px)`;}
    },{passive:true});
    item.addEventListener("touchend",ev=>{
      if(!dragging)return;dragging=false;
      const dx=ev.changedTouches[0].clientX-startX;
      item.style.transition="transform .2s ease";
      if(dx<-50){
        item.style.transform="translateX(-80px)";swiped=true;
        // close any other open swipes
        list.querySelectorAll(".hist-item.swiped").forEach(x=>{if(x!==item){x.classList.remove("swiped");x.style.transform="";}});
        item.classList.add("swiped");
      } else {
        item.style.transform="";item.classList.remove("swiped");swiped=false;
      }
    },{passive:true});
    // Tap delete bg
    wrap.querySelector(".hist-del-bg").addEventListener("click",()=>{
      const id=parseInt(wrap.dataset.id);
      wrap.style.transition="opacity .2s,max-height .3s";
      wrap.style.opacity="0";wrap.style.maxHeight="0";wrap.style.overflow="hidden";
      setTimeout(()=>{entries=entries.filter(e=>e.id!==id);saveEntries();renderHistory();},280);
    });
    // Tap elsewhere closes swipe
    item.addEventListener("click",()=>{
      if(swiped){item.style.transform="";item.classList.remove("swiped");swiped=false;}
    });
  });
}

function openSettings(){document.getElementById("screen-settings").classList.remove("slide-left");}
function closeSettings(){document.getElementById("screen-settings").classList.add("slide-left");}
function saveSettings(){
  cfg.url=document.getElementById("cfg-url").value.trim();
  cfg.c1=document.getElementById("cfg-c1").value.trim()||"Custom 1";
  cfg.c2=document.getElementById("cfg-c2").value.trim()||"Custom 2";
  cfg.c3=document.getElementById("cfg-c3").value.trim()||"Custom 3";
  try{localStorage.setItem("exp_c",JSON.stringify(cfg));}catch(e){}
  buildCats();closeSettings();
}
function showScreen(n){
  document.getElementById("screen-add").classList.toggle("hidden",n!=="add");
  document.getElementById("screen-history").classList.toggle("hidden",n!=="history");
  document.getElementById("nav-add").classList.toggle("active",n==="add");
  document.getElementById("nav-history").classList.toggle("active",n==="history");
  if(n==="history")renderHistory();
}
init();
</script>
</body>
</html>
